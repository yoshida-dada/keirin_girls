name: Refresh predictions (latest odds)

# レース時間帯に定期実行し、発走が近いガールズレースの最新オッズでEVを更新して
# dashboard/data.json を差し替える（③b）。DBは使わずコミット済みモデル＋オッズ取得のみ。
# 更新があれば commit → Pages が自動デプロイ。
on:
  # 定期実行は無効化（オッズ更新はローカル常駐 scripts/live_scheduler.py が主担当。
  # Actionsとローカルの二重pushによる競合を避けるため）。手動実行のみ残す。
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-predictions
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: pip install requests beautifulsoup4 numpy pandas
      - name: Refresh predictions (races within 15 min of post)
        run: python scripts/refresh_predictions.py --only-near 15
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- dashboard/data.json; then
            git add dashboard/data.json
            git commit -m "chore: refresh predictions (latest odds)"
            git push
          else
            echo "no change"
          fi
