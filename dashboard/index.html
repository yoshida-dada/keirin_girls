<title>ガールズケイリン 期待値AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7048e8">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ガールズEV">
<style>
:root{
  --bg:#f4f1fb; --surface:#ffffff; --surface2:#f7f4fd; --ink:#1e1633; --muted:#6b6480;
  --border:#e5dff2; --border2:#efe9f8; --accent:#7048e8; --accent-soft:#e9e2fb;
  --good:#2f9e44; --good-soft:#e4f5e8; --edge:#1098ad; --edge-soft:#d8f1f4;
  --loss:#e03131; --loss-soft:#fbe3e3; --warn:#e8a800;
  --shadow:0 1px 2px rgba(50,30,80,.06),0 8px 22px -12px rgba(50,30,80,.18);
}
@media (prefers-color-scheme:dark){:root{
  --bg:#141019; --surface:#1d1726; --surface2:#231b30; --ink:#ece7f5; --muted:#9a8fb0;
  --border:#302640; --border2:#281f36; --accent:#9775fa; --accent-soft:#2a2140;
  --good:#51cf66; --good-soft:#173021; --edge:#3bc9db; --edge-soft:#0e2c30;
  --loss:#ff6b6b; --loss-soft:#331a1a; --warn:#f0c040;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 10px 28px -14px rgba(0,0,0,.7);
}}
:root[data-theme="light"]{--bg:#f4f1fb;--surface:#ffffff;--surface2:#f7f4fd;--ink:#1e1633;--muted:#6b6480;--border:#e5dff2;--border2:#efe9f8;--accent:#7048e8;--accent-soft:#e9e2fb;--good:#2f9e44;--good-soft:#e4f5e8;--edge:#1098ad;--edge-soft:#d8f1f4;--loss:#e03131;--loss-soft:#fbe3e3;--warn:#e8a800;--shadow:0 1px 2px rgba(50,30,80,.06),0 8px 22px -12px rgba(50,30,80,.18);}
:root[data-theme="dark"]{--bg:#141019;--surface:#1d1726;--surface2:#231b30;--ink:#ece7f5;--muted:#9a8fb0;--border:#302640;--border2:#281f36;--accent:#9775fa;--accent-soft:#2a2140;--good:#51cf66;--good-soft:#173021;--edge:#3bc9db;--edge-soft:#0e2c30;--loss:#ff6b6b;--loss-soft:#331a1a;--warn:#f0c040;--shadow:0 1px 2px rgba(0,0,0,.35),0 10px 28px -14px rgba(0,0,0,.7);}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.wrap{max-width:680px;margin:0 auto;padding:0 14px calc(48px + env(safe-area-inset-bottom))}

header{padding:calc(16px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 6px calc(14px + env(safe-area-inset-left));max-width:680px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.16rem;letter-spacing:.01em}
.brand .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);flex:none;box-shadow:0 0 0 4px var(--accent-soft)}
.gen{margin-left:auto;font-size:.7rem;color:var(--muted);font-weight:500;text-align:right}
.theme-btn{background:var(--surface);border:1px solid var(--border);color:var(--ink);border-radius:9px;
  padding:6px 11px;font-size:.78rem;font-weight:700;font-family:inherit;cursor:pointer}

.notice{max-width:680px;margin:8px auto 0;padding:0 14px}
.notice .box{background:var(--accent-soft);border:1px solid var(--accent);border-radius:11px;
  padding:9px 12px;font-size:.74rem;color:var(--ink);line-height:1.55}
.notice .box b{color:var(--accent)}

.sect{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:24px 2px 4px}
.sub{font-size:.72rem;color:var(--muted);margin:0 2px 10px;line-height:1.5}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow)}

.badge{display:inline-block;font-size:.6rem;font-weight:800;letter-spacing:.04em;padding:2px 8px;border-radius:999px;vertical-align:middle;margin-left:6px}
.badge.sample{background:var(--accent-soft);color:var(--accent)}
.badge.pending{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.badge.ok{background:var(--good-soft);color:var(--good)}

.empty{background:var(--surface);border:1px dashed var(--border);border-radius:12px;padding:18px 14px;
  text-align:center;color:var(--muted);font-size:.82rem;line-height:1.6}

/* tables */
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);background:var(--surface)}
table.t{width:100%;border-collapse:collapse;font-size:.82rem;min-width:460px}
table.t th{position:sticky;top:0;background:var(--surface2);font-size:.64rem;letter-spacing:.02em;color:var(--muted);
  font-weight:800;padding:8px 8px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;z-index:1}
table.t th.l,table.t td.l{text-align:left}
table.t td{padding:8px 8px;text-align:right;border-bottom:1px solid var(--border2);white-space:nowrap;font-variant-numeric:tabular-nums}
table.t tr:last-child td{border-bottom:none}
.combo{font-weight:800;letter-spacing:.03em}
.evp{color:var(--good);font-weight:800}
.evp.lo{color:var(--muted)}
.rtag{font-size:.66rem;font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap}
.rtag.axis{background:var(--good-soft);color:var(--good)}
.rtag.std{background:var(--edge-soft);color:var(--edge)}
.rtag.chaos{background:var(--accent-soft);color:var(--accent)}
.tfoot-row td{background:var(--surface2);font-weight:800;border-top:2px solid var(--border)}

/* toggle */
.secthead{display:flex;align-items:center;gap:8px;margin:24px 2px 4px;flex-wrap:wrap}
.secthead .sect{margin:0}
.vtoggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:none;margin-left:auto}
.vtoggle button{background:var(--surface);border:none;color:var(--muted);font-family:inherit;font-size:.72rem;
  font-weight:800;padding:5px 12px;cursor:pointer}
.vtoggle button[aria-pressed="true"]{background:var(--accent);color:#fff}
.vtoggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* heatmap */
.hmwrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);background:var(--surface)}
table.hm{border-collapse:collapse;width:100%;min-width:520px;font-size:.8rem}
table.hm th{font-size:.66rem;color:var(--muted);font-weight:800;padding:8px 5px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
table.hm th.l,table.hm td.l{text-align:left;padding-left:10px}
table.hm td{padding:0;border-bottom:1px solid var(--border2);text-align:center}
table.hm td.l{padding:8px 10px;font-weight:800}
.hcell{height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.08;border-radius:8px;margin:3px}
.hcell .r{font-weight:800;font-variant-numeric:tabular-nums;font-size:.92rem}
.hcell .n{font-size:.58rem;opacity:.8}
.hcell.empty{color:var(--muted);background:repeating-linear-gradient(45deg,transparent,transparent 5px,var(--border2) 5px,var(--border2) 6px)}
.legend{display:flex;gap:14px;justify-content:center;align-items:center;font-size:.68rem;color:var(--muted);margin-top:10px;flex-wrap:wrap}
.legend .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-2px}

/* dist bars */
.barrow{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:.78rem}
.barrow .bl{width:118px;flex:none;display:flex;align-items:center;gap:7px}
.bartrack{flex:1;height:22px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;position:relative;overflow:hidden}
.barfill{height:100%;border-radius:5px 0 0 5px}
.ref100{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.6}
.barrow .bv{width:74px;flex:none;text-align:right;font-weight:800;font-variant-numeric:tabular-nums}
.dot-sw{width:11px;height:11px;border-radius:3px;flex:none}

/* svg charts */
.tksvg{width:100%;height:auto;display:block;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.note{font-size:.7rem;color:var(--muted);margin-top:9px;line-height:1.6}
.kpirow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.kpi{flex:1 1 130px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow)}
.kpi .kl{font-size:.66rem;color:var(--muted);font-weight:700}
.kpi .kv{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px;line-height:1.1}
.kpi .kv.pos{color:var(--good)} .kpi .kv.neg{color:var(--loss)}
.kpi .kn{font-size:.62rem;color:var(--muted);margin-top:2px}

/* data status */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:520px){.tiles{grid-template-columns:repeat(3,1fr)}}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 12px;box-shadow:var(--shadow)}
.tile .tl{font-size:.66rem;color:var(--muted);font-weight:700}
.tile .tv{font-size:1.35rem;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px;line-height:1.1}
.tile .tn{font-size:.62rem;color:var(--muted);margin-top:2px}
.fsrow{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.fspill{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:6px 11px;font-size:.74rem;font-weight:700}
.fspill b{color:var(--accent)}

/* predictions (本日のレース予測) */
.pred-disc{background:var(--warn);color:#3a2c00;border-radius:11px;padding:9px 12px;font-size:.73rem;line-height:1.55;font-weight:600;margin-bottom:14px}
:root[data-theme="dark"] .pred-disc{color:#1a1400}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .pred-disc{color:#1a1400}}
.pred-venue{margin:0 0 12px;border:1px solid var(--border);border-radius:14px;background:var(--surface);box-shadow:var(--shadow);overflow:hidden}
.pred-venue>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:11px 14px;font-weight:800;font-size:.95rem;user-select:none}
.pred-venue>summary::-webkit-details-marker{display:none}
.pred-venue>summary .chev{margin-left:auto;color:var(--muted);font-size:.8rem;transition:transform .15s}
.pred-venue[open]>summary .chev{transform:rotate(90deg)}
.pred-venue>summary .vcount{font-size:.68rem;font-weight:700;color:var(--muted)}
.pred-races{padding:0 12px 6px}
.pred-race{border-top:1px solid var(--border2);padding:12px 2px 14px}
.pred-race:first-child{border-top:none}
.pred-rhead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.pred-rno{font-weight:800;font-size:1.02rem}
.pred-rno small{font-size:.68rem;color:var(--muted);font-weight:700;margin-left:3px}
.pred-dl{font-size:.68rem;color:var(--muted);font-weight:700}
.pred-src{margin-left:auto;font-size:.6rem;color:var(--muted);font-weight:700;text-align:right}
.pred-top1{font-size:.66rem;color:var(--muted);font-weight:700;margin:2px 0 9px}
.pred-top1 b{color:var(--ink);font-variant-numeric:tabular-nums}
.carno{width:22px;height:22px;flex:none;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.78rem;font-variant-numeric:tabular-nums;border:1px solid rgba(0,0,0,.18)}
/* 出走表（列可変テーブル）。車/選手は横スクロールでも左に固定表示 */
.rt-wrap{margin:2px 0 2px}
table.rt{border-collapse:collapse;width:100%;min-width:max-content;font-size:.76rem}
table.rt th{position:sticky;top:0;z-index:1;background:var(--surface2);font-size:.6rem;letter-spacing:.02em;color:var(--muted);font-weight:800;padding:6px 8px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
table.rt td{padding:6px 8px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border2);font-variant-numeric:tabular-nums;font-weight:700}
table.rt th.l,table.rt td.l{text-align:left}
table.rt td.strong,table.rt th.strong{font-weight:800}
table.rt td.strong{color:var(--ink);font-size:.84rem}
table.rt td s{color:var(--muted);text-decoration:none;font-size:.82em;font-weight:700;margin-left:2px}
table.rt th.rt-car,table.rt td.rt-car{position:sticky;left:0;z-index:2;width:30px;min-width:30px;text-align:center;padding-left:4px;padding-right:4px;background:var(--surface)}
table.rt th.rt-car{z-index:3;background:var(--surface2)}
table.rt th.rt-name,table.rt td.rt-name{position:sticky;left:30px;z-index:2;background:var(--surface);font-weight:800;vertical-align:top}
table.rt td.rt-name{padding-top:6px}
table.rt th.rt-name{z-index:3;background:var(--surface2)}
/* 出走表に統合した今場所成績（選手名の下） */
.rt .rn-nm{display:block;white-space:nowrap;font-weight:800}
.rt .rn-home{display:inline-block;margin-left:6px;font-size:.56rem;font-weight:800;color:#fff;background:#e8590c;border-radius:5px;padding:1px 5px;vertical-align:middle;letter-spacing:.03em}
.rt .rn-home.dist{background:var(--muted)}
.rt .rn-meet{display:flex;gap:5px;align-items:baseline;margin-top:2px;font-size:.6rem;font-weight:700;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.rt .rn-meet .rn-md{color:var(--muted)}
.rt .rn-meet .rn-mr{color:var(--muted)}
.rt .rn-meet .rn-mp{color:var(--ink);font-weight:800}
.rt .rn-meet .rn-mp.p1{color:#e03131}
.rt .rn-meet .rn-mp.p3{color:var(--accent)}
.rt .rn-meet .rn-ml{color:var(--muted)}
table.rt tr.rt-top td{background:var(--accent-soft)}
table.rt tr.rt-top td.rt-car,table.rt tr.rt-top td.rt-name{background:var(--accent-soft)}
/* レース番号タブ（会場選択後に表示） */
.pred-rtabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px}
.pred-rtab{background:var(--surface);border:1px solid var(--border);color:var(--ink);font-family:inherit;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 11px;border-radius:9px;min-width:52px}
.pred-rtab .rn{font-size:.82rem;font-weight:800;font-variant-numeric:tabular-nums}
.pred-rtab .dl{font-size:.58rem;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.pred-rtab .done{font-size:.54rem;font-weight:800;color:var(--good)}
.pred-rtab[aria-selected="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
.pred-rtab[aria-selected="true"] .dl,.pred-rtab[aria-selected="true"] .done{color:rgba(255,255,255,.85)}
.pred-rtab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.pred-rpanel .pred-vbox{border:1px solid var(--border);border-radius:14px;background:var(--surface);box-shadow:var(--shadow);padding:2px 14px 12px}
/* レース内 予測／確定結果 タブ */
.rc-tabs{display:flex;gap:6px;margin:10px 0 4px}
.rc-tab{flex:1 1 0;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:.8rem;font-weight:800;padding:8px 10px;border-radius:10px;cursor:pointer}
.rc-tab[aria-selected="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
.rc-tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.rc-pane[hidden]{display:none}
/* 確定結果 */
.res{margin:6px 0 12px;border:1px solid var(--good);border-radius:11px;background:var(--good-soft);overflow:hidden}
.res-head{padding:8px 11px;font-size:.78rem;font-weight:800;color:var(--good);display:flex;align-items:center;gap:8px}
.res-head .res-time{margin-left:auto;font-size:.62rem;font-weight:700;color:var(--muted)}
.res .tblwrap{border-radius:0;border-left:none;border-right:none;background:var(--surface)}
table.res-t{font-size:.76rem}
table.res-t th.res-pos,table.res-t td.res-pos{position:static;width:26px;min-width:26px;text-align:center;font-weight:800}
table.res-t th.res-car,table.res-t td.res-car{position:static;width:30px;min-width:30px;text-align:center}
table.res-t tr.res-tr.p1 td{background:var(--accent-soft)}
table.res-t td.res-pos{color:var(--ink)}
table.res-t tr.p1 td.res-pos{color:#e03131;font-size:.9rem}
.res-sb{font-size:.6rem;font-weight:800;color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:0 3px;margin-left:2px}
.res-foot{display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;padding:9px 11px;font-size:.72rem;font-weight:700;color:var(--ink)}
.res-foot .res-yen{color:var(--good);font-variant-numeric:tabular-nums}
.res-foot .res-pop{font-size:.64rem;color:var(--muted);font-weight:700}
.res-hit{font-size:.64rem;font-weight:800;border-radius:999px;padding:2px 9px}
.res-hit.ok{background:var(--good-soft);color:var(--good);border:1px solid var(--good)}
.res-hit.ng{background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}
/* 列表示・並び順の設定パネル */
.cc{margin:0 0 12px;border:1px solid var(--border);border-radius:11px;background:var(--surface);box-shadow:var(--shadow);overflow:hidden}
.cc>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:.76rem;font-weight:800;user-select:none}
.cc>summary::-webkit-details-marker{display:none}
.cc>summary .cc-hint{font-size:.62rem;font-weight:700;color:var(--muted)}
.cc>summary .chev{margin-left:auto;color:var(--muted);font-size:.8rem;transition:transform .15s}
.cc[open]>summary .chev{transform:rotate(90deg)}
.cc>summary:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.cc-body{padding:2px 12px 12px}
.cc-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
.cc-item{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 9px}
.cc-chk{flex:1 1 auto;display:flex;align-items:center;gap:8px;font-size:.76rem;font-weight:700;cursor:pointer}
.cc-chk input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.cc-move{flex:none;display:flex;gap:4px}
.cc-btn{width:30px;height:28px;border:1px solid var(--border);background:var(--surface);border-radius:7px;color:var(--ink);font-size:.7rem;cursor:pointer;font-family:inherit}
.cc-btn:disabled{opacity:.35;cursor:default}
.cc-btn:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.cc-actions{margin-top:9px}
.cc-reset{border:1px solid var(--border);background:var(--surface2);border-radius:8px;padding:6px 12px;font-size:.72rem;font-weight:800;color:var(--ink);cursor:pointer;font-family:inherit}
.cc-note{font-size:.62rem;color:var(--muted);font-weight:600;margin:8px 0 0;line-height:1.5}
.pred-tfhead{font-size:.64rem;letter-spacing:.04em;color:var(--muted);font-weight:800;margin:12px 2px 5px;text-transform:uppercase}
.oddson{color:var(--good);font-weight:800}
/* 展開予想（並び予想＝車番のみ1行 ＋ 展開パターン） */
.dev{margin:10px 2px 4px;padding:10px 12px;border:1px solid var(--border2);border-radius:10px;background:var(--surface2)}
.dev-head{font-size:.72rem;font-weight:800;display:flex;flex-wrap:wrap;gap:8px;align-items:center;color:var(--ink)}
.dev-src{font-size:.6rem;color:var(--muted);font-weight:600}
.dev-narabi-h,.dev-pat-h{font-size:.6rem;letter-spacing:.03em;color:var(--muted);font-weight:800;margin:9px 2px 4px;text-transform:uppercase}
.dev-line{display:flex;flex-wrap:nowrap;align-items:center;gap:3px;overflow-x:auto;padding-bottom:2px}
.dev-node{display:inline-flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:2px 6px;flex:none}
.dev-arrow{color:var(--muted);font-size:.62rem;flex:none}
.dev-fav{color:#e8590c;font-weight:800}
.dev-pats{display:flex;flex-direction:column;gap:5px}
.dev-pat{display:flex;align-items:center;gap:8px;font-size:.72rem}
.dev-pat-i{width:1.3em;text-align:center;flex:none}

<script>
function boot(DB){
  const yen = v => v==null ? "—" : "¥"+Math.round(v).toLocaleString();
  const pct1 = v => v==null ? "—" : (v*100).toFixed(1)+"%";
  const pctR = v => v==null ? "—" : Math.round(v*100)+"%";
  const oddsF = v => v==null ? "—" : v.toFixed(1);
  const esc = s => (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const cssvar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

  document.getElementById("gen").textContent = "生成 " + (DB.generated||"").replace("T"," ").slice(0,16);

  // notice
  if(DB.notice){
    document.getElementById("notice").innerHTML =
      `<div class="box"><b>ℹ お知らせ</b> ${esc(DB.notice)}</div>`;
  }

  // status badge helper
  const STATUS_BADGE = { sample:['sample','サンプル'], pending:['pending','未算出'],
    ready:['ok','算出済'], ok:['ok','実データ'], none:['pending','対象なし'] };
  function badge(st){ const b=STATUS_BADGE[st]||STATUS_BADGE.pending;
    return `<span class="badge ${b[0]}">${b[1]}</span>`; }
  function isShown(st){ return st==="sample"||st==="ready"||st==="ok"; }
  const rtagCls = t => t==="軸堅"?"axis":(t==="混戦"?"chaos":"std");
  function emptyBox(msg){ return `<div class="empty">${esc(msg)}</div>`; }

  // ROI diverging color: gray midpoint at 1.0, green above, red below
  function roiColor(roi){
    if(roi==null) return "var(--surface2)";
    const good=cssvar("--good"), loss=cssvar("--loss"), surf=cssvar("--surface");
    if(roi>=1){ const t=Math.min((roi-1)/0.3,1); return `color-mix(in srgb, ${good} ${(18+t*52).toFixed(0)}%, ${surf})`; }
    const t=Math.min((1-roi)/0.4,1); return `color-mix(in srgb, ${loss} ${(14+t*46).toFixed(0)}%, ${surf})`;
  }
  const roiTextCol = roi => roi==null?"var(--muted)":(roi>=1?"var(--good)":"var(--loss)");

  // ---------- 本日のレース予測（着順確率・買い目ではない） ----------
  (function(){
    const P = DB.predictions||{};
    document.getElementById("predTitle").innerHTML = "本日のレース予測 "+badge(P.status);
    document.getElementById("predSub").textContent =
      (P.date?`対象日 ${P.date}　`:"") + (P.model?`モデル ${P.model}`:"");
    const host = document.getElementById("predBody");
    const races = P.races||[];
    if(!isShown(P.status) || !races.length){
      host.innerHTML = emptyBox("本日のレース予測はまだ生成されていません。各車の1着確率と三連単モデル確率が会場ごとに表示されます。");
      return;
    }
    // 車番→競走服の色（1白2黒3赤4青5黄6緑7橙8桃9紫）
    const CARCOL = {
      1:["#ffffff","#111"], 2:["#242424","#fff"], 3:["#e03131","#fff"],
      4:["#1c7ed6","#fff"], 5:["#f2d600","#111"], 6:["#2f9e44","#fff"],
      7:["#f76707","#fff"], 8:["#f06595","#fff"], 9:["#7048e8","#fff"]
    };
    function carChip(n){ const c=CARCOL[n]||["var(--surface2)","var(--ink)"];
      return `<span class="carno" style="background:${c[0]};color:${c[1]}">${n}</span>`; }
    const oddsCell = v => (v==null||v>=9999) ? "—" : v.toFixed(1);

    // 会場ごとにまとめる（出現順を保持）
    const byVenue = new Map();
    races.forEach(r=>{ const k=r.venue||"—"; if(!byVenue.has(k)) byVenue.set(k,[]); byVenue.get(k).push(r); });

    // ===== 出走表の列定義（表示ON/OFF・並び替え可能。車/選手は固定列で常時先頭表示）=====
    const sub = s => s!=null && s!=="" ? `<s>${s}</s>` : "";       // 補助数値（走数など）
    const COLUMNS = [
      {key:"win",   label:"1着確率",  th:"1着確率", cls:"strong", get:rd=>pct1(rd.win_prob)},
      {key:"synth", label:"合成オッズ", th:"合成",  cls:"", get:rd=> rd.synth_odds_1st!=null?(+rd.synth_odds_1st).toFixed(1)+"倍":"—"},
      {key:"leg",   label:"脚質",      th:"脚",    cls:"", get:rd=> esc(rd.leg||"—")},
      {key:"score", label:"得点",      th:"得点",  cls:"", get:rd=>(rd.score||0).toFixed(1)},
      {key:"wr",    label:"直近勝率",  th:"勝率",  cls:"", get:rd=> rd.win_rate!=null?pctR(rd.win_rate):"—"},
      {key:"fair",  label:"必要オッズ", th:"必要",  cls:"", get:rd=> rd.fair_odds_1st!=null?(+rd.fair_odds_1st).toFixed(1)+"倍":"—"},
      {key:"career",label:"通算勝率",  th:"通算",  cls:"", get:rd=> rd.career_win_rate!=null?`${(rd.career_win_rate*100).toFixed(1)}%${sub((rd.career_starts||0)+"走")}`:"—"},
      {key:"r5",    label:"直近5走平均着", th:"直近5走", cls:"", get:rd=> rd.recent5_finish!=null?rd.recent5_finish.toFixed(1)+"着":"—"},
      {key:"venue", label:"当地勝率",  th:"当地",  cls:"", get:rd=> (rd.venue_win_rate!=null&&rd.venue_starts)?`${(rd.venue_win_rate*100).toFixed(0)}%${sub(rd.venue_starts+"走")}`:"—"},
      {key:"days",  label:"出走間隔",  th:"間隔",  cls:"", get:rd=> rd.days_since!=null?rd.days_since+"日":"—"},
      // 脚質プロファイル（直近1年）。S=スタート先頭 B=バック先頭 / 逃捲差=1着決まり手回数
      {key:"s",     label:"S回数(直近1年)", th:"S", cls:"", get:rd=> rd.s_cnt!=null?rd.s_cnt:"—"},
      {key:"b",     label:"B回数(直近1年)", th:"B", cls:"", get:rd=> rd.b_cnt!=null?rd.b_cnt:"—"},
      {key:"nige",  label:"逃げ1着(直近1年)", th:"逃", cls:"", get:rd=> rd.nige!=null?rd.nige:"—"},
      {key:"makuri",label:"捲り1着(直近1年)", th:"捲", cls:"", get:rd=> rd.makuri!=null?rd.makuri:"—"},
      {key:"sashi", label:"差し1着(直近1年)", th:"差", cls:"", get:rd=> rd.sashi!=null?rd.sashi:"—"},
    ];
    const colByKey = Object.fromEntries(COLUMNS.map(c=>[c.key,c]));
    const DEFAULT_ORDER = COLUMNS.map(c=>c.key);
    const DEFAULT_HIDDEN = ["fair","days"];       // 既定は控えめ（設定でいつでも表示）
    const LS_KEY = "keirin_pred_cols_v1";
    function loadCfg(){
      try{ const j=JSON.parse(localStorage.getItem(LS_KEY)||"null");
        if(j && Array.isArray(j.order)) return {order:j.order.slice(), hidden:(j.hidden||[]).slice()};
      }catch(e){}
      return {order:DEFAULT_ORDER.slice(), hidden:DEFAULT_HIDDEN.slice()};
    }
    function saveCfg(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(cfg)); }catch(e){} }
    let cfg = loadCfg();
    DEFAULT_ORDER.forEach(k=>{ if(!cfg.order.includes(k)) cfg.order.push(k); });   // 新列は末尾に補完
    cfg.order = cfg.order.filter(k=>colByKey[k]);
    cfg.hidden = cfg.hidden.filter(k=>colByKey[k]);
    function activeCols(){ return cfg.order.filter(k=>!cfg.hidden.includes(k)).map(k=>colByKey[k]); }

    // 出走表（設定した列・順で描画。riders は1着確率降順で格納済み → 先頭=本命行を強調）
    function riderTable(r){
      const cols = activeCols();
      const head = `<th class="rt-car">車</th><th class="rt-name l">選手</th>`
        + cols.map(c=>`<th class="${c.cls}">${c.th}</th>`).join("");
      const body = (r.riders||[]).map((rd,i)=>{
        const tds = cols.map(c=>`<td class="${c.cls}">${c.get(rd)}</td>`).join("");
        // 今場所成績を選手名の下に統合（新しい開催日から順に、初日を除く最大日数分）
        const meet = (rd.meet||[]).slice().reverse();
        const meetHtml = meet.map(m=>{
          const pos=m[2], pcls = pos===1?" p1":(pos!=null&&pos<=3?" p3":"");
          return `<span class="rn-meet"><span class="rn-md">${fmtMD(m[0])}</span>`
            +`<span class="rn-mr">${m[1]!=null?m[1]+"R":""}</span>`
            +`<span class="rn-mp${pcls}">${pos!=null?pos+"着":"—"}</span>`
            +(m[3]!=null?`<span class="rn-ml">上${(+m[3]).toFixed(1)}</span>`:"")+`</span>`;
        }).join("");
        return `<tr${i===0?' class="rt-top"':''}>`
          +`<td class="rt-car">${carChip(rd.car)}</td>`
          +`<td class="rt-name l"><span class="rn-nm">${esc(rd.name||"")}`
          +`${rd.home?`<span class="rn-home" title="地元(同県)開催">地元</span>`:(rd.home_dist?`<span class="rn-home dist" title="同地区開催">地区</span>`:"")}`
          +`</span>${meetHtml}</td>${tds}</tr>`;
      }).join("");
      return `<div class="tblwrap rt-wrap"><table class="rt"><thead><tr>${head}</tr></thead>`
        +`<tbody>${body}</tbody></table></div>`;
    }

    // 今場所成績は出走表(riderTable)の選手名の下に統合表示（imsBlockは廃止）。
    const fmtMD = d => { const m=/^\d{4}-(\d{2})-(\d{2})/.exec(d||""); return m?`${+m[1]}/${+m[2]}`:esc(d||""); };

    // 確定結果（発走後に取得）: 着順・上り・決まり手・払戻＋予測的中を表示。
    function resultBlock(r){
      const R = r.result;
      if(!R || !(R.order||[]).length) return "";
      const rows = R.order.map(o=>{
        const pcls = o.pos===1?" p1":(o.pos!=null&&o.pos<=3?" p3":"");
        return `<tr class="res-tr${pcls}">`
          +`<td class="res-pos">${o.pos!=null?o.pos:"—"}</td>`
          +`<td class="res-car">${carChip(o.car)}</td>`
          +`<td class="l">${esc(o.name||"")}</td>`
          +`<td>${o.last_lap!=null?(+o.last_lap).toFixed(1):"—"}</td>`
          +`<td class="l">${esc(o.kimarite||"")}${o.sb?` <span class="res-sb">${esc(o.sb)}</span>`:""}</td></tr>`;
      }).join("");
      const p = R.payout;
      const payTxt = p
        ? `三連単 <b>${esc(p.combo)}</b> <b class="res-yen">¥${Number(p.yen).toLocaleString()}</b>`
          +(p.pop!=null?` <span class="res-pop">${p.pop}番人気</span>`:"")
        : "払戻情報なし";
      const h = R.hit||{};
      let hitTxt = "";
      if(h.win_hit!=null)
        hitTxt += `<span class="res-hit ${h.win_hit?"ok":"ng"}">本命${h.win_hit?"的中":"不的中"}</span>`;
      if(h.tri_rank!=null)
        hitTxt += `<span class="res-hit ${h.tri_rank<=10?"ok":"ng"}">三連単 モデル${h.tri_rank}位</span>`;
      else if("tri_rank" in h)
        hitTxt += `<span class="res-hit ng">三連単 モデル圏外</span>`;
      return `<div class="res"><div class="res-head">🏁 確定結果`
        +(R.fetched_at?`<span class="res-time">取得 ${esc(String(R.fetched_at).slice(11))}</span>`:"")+`</div>`
        +`<div class="tblwrap"><table class="rt res-t"><thead><tr>`
        +`<th class="res-pos">着</th><th class="res-car">車</th><th class="l">選手</th><th>上り</th><th class="l">決まり手</th>`
        +`</tr></thead><tbody>${rows}</tbody></table></div>`
        +`<div class="res-foot"><span class="res-pay">${payTxt}</span>${hitTxt}</div></div>`;
    }

    // 出走者同士の過去対戦成績（同一レースでの着順比較）マトリクス。行=当該車の先着 - 相手の先着。
    function h2hBlock(r){
      const h = r.h2h;
      if(!h || !h.cars || h.cars.length<2 || !h.cell || !Object.keys(h.cell).length)
        return "";
      const cars = h.cars;
      const head = `<th class="h2h-corner">先着＼相手</th>`+cars.map(c=>`<th>${carChip(c)}</th>`).join("");
      const body = cars.map(row=>{
        const rec = h.cell[row]||{};
        const tds = cars.map(col=>{
          if(row===col) return `<td><div class="h2h-cell dead">—</div></td>`;
          const x = rec[col];
          if(!x || !x.n) return `<td><div class="h2h-cell na">—</div></td>`;
          const cls = x.w>x.l ? " adv" : (x.w<x.l ? " dis" : "");
          return `<td><div class="h2h-cell${cls}">`
            +`<span class="wl">${x.w}-${x.l}</span><span class="n">${x.n}戦</span></div></td>`;
        }).join("");
        return `<tr><th class="h2h-rh">${carChip(row)}</th>${tds}</tr>`;
      }).join("");
      const names = cars.map(c=>`${c}=${esc(h.names[c]||"")}`).join("　");
      return `<details class="h2h"><summary aria-label="過去対戦成績の開閉">`
        +`<span class="h2h-ttl">🤼 過去の対戦成績</span>`
        +`<span class="h2h-lab">同一レースでの着順比較</span><span class="chev">▸</span></summary>`
        +`<div class="h2h-body"><div class="tblwrap"><table class="h2h-t"><thead><tr>${head}</tr></thead>`
        +`<tbody>${body}</tbody></table></div>`
        +`<div class="h2h-legend"><span><span class="h2h-sw adv"></span>先着優位</span>`
        +`<span><span class="h2h-sw dis"></span>劣位</span><span>数字＝当該車の先着-相手の先着（戦=対戦数）</span></div>`
        +`<div class="h2h-names">${names}</div></div></details>`;
    }

    // EV買い目（最新オッズ×モデルの参考値。買い目推奨ではない）。combos: [1着,2着,3着,オッズ,確率,EV]。
    // 1着車で表示切替し、車番順(2着→3着 昇順)に並べてフォーメーション購入を容易にする。
    const EV_THR = 1.10;
    let evUid = 0;
    const evReg = {};
    function _evSummary(buys){
      const prob = buys.reduce((s,c)=>s+(c[4]||0),0);                 // 的中率=モデル確率の総和
      const inv = buys.reduce((s,c)=>s+(c[3]>0?1/c[3]:0),0);          // 合成オッズ=1/Σ(1/オッズ)
      return {n: buys.length, prob, synth: inv>0?1/inv:null};
    }
    function renderEvGrid(uid, head){
      const g = evReg[uid]||{};
      const buys = (g.buys||[]).filter(c=>c[0]===head)
        .sort((x,y)=> (x[1]-y[1]) || (x[2]-y[2]));                    // 車番順(2着→3着)
      if(!buys.length) return `<div class="om-none">この車頭でEV≥${EV_THR.toFixed(2)}の買い目なし</div>`;
      const s = _evSummary(buys);
      const sub = `<div class="ev-subsum">${carChip(head)}頭 <b>${s.n}</b>点買い ｜ 的中率 <b>${(s.prob*100).toFixed(1)}%</b> ｜ 合成 <b>${s.synth!=null?s.synth.toFixed(1):"—"}倍</b></div>`;
      const rows = buys.map(c=>`<tr>`
        +`<td class="l combo">${c[0]}-${c[1]}-${c[2]}</td>`
        +`<td>${(c[4]*100).toFixed(1)}%</td>`
        +`<td>${(+c[3]).toFixed(1)}</td>`
        +`<td class="evp">${c[5].toFixed(2)}</td></tr>`).join("");
      return sub + `<div class="tblwrap"><table class="t"><thead><tr>`
        +`<th class="l">買い目</th><th>モデル確率</th><th>オッズ</th><th>EV</th>`
        +`</tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    function evBlock(r){
      const combos = r.combos||[];
      const hasOdds = combos.some(c=>c[3]!=null && c[3]<9999);
      if(!hasOdds)
        return `<div class="pred-ev"><div class="pred-ev-none">オッズ未発売</div></div>`;
      const buys = combos.filter(c=>c[3]!=null && c[3]<9999 && c[5]!=null && c[5]>=EV_THR);
      if(!buys.length)
        return `<div class="pred-ev"><div class="pred-ev-none">最新オッズでEV≥${EV_THR.toFixed(2)}の買い目なし</div></div>`;
      const uid = evUid++;
      evReg[uid] = {buys};
      const heads = [...new Set(buys.map(c=>c[0]))].sort((a,b)=>a-b);
      const init = heads[0];
      const all = _evSummary(buys);
      const tabs = heads.map(c=>`<button class="ev-tab" type="button" role="tab" data-ev="${uid}" data-car="${c}"`
        +` aria-selected="${c===init?"true":"false"}" tabindex="${c===init?0:-1}" aria-label="1着 ${c}番">`
        +`${carChip(c)}<span class="ev-tc">${buys.filter(b=>b[0]===c).length}</span></button>`).join("");
      return `<div class="pred-ev">`
        +`<div class="pred-ev-head">🎯 最新オッズでEV≥${EV_THR.toFixed(2)}の買い目 <span class="nb">${buys.length}点</span></div>`
        +`<div class="ev-allsum">全${all.n}点を購入した場合 ｜ 的中率 <b>${(all.prob*100).toFixed(1)}%</b>（モデル確率の総和）｜ 合成オッズ <b>${all.synth!=null?all.synth.toFixed(1):"—"}倍</b></div>`
        +`<div class="ev-sel" role="tablist" aria-label="1着車の選択"><span class="om-sellab">1着</span>${tabs}</div>`
        +`<div id="ev-grid-${uid}">${renderEvGrid(uid, init)}</div>`
        +`<div class="pred-ev-note">車番順（2着→3着）で表示。EV=モデル確率×オッズ。合成オッズ=1/Σ(1/オッズ)。`
        +`参考値でエッジ未確立・買い目推奨ではありません。</div>`
        +`</div>`;
    }

    // 三連単オッズテーブル（1着固定マトリクス。確率×市場オッズの比較・買い目推奨ではない）
    let omUid = 0;
    const omReg = {};
    function omCars(uid){
      const g=omReg[uid]||{}; const s=new Set();
      (g.combos||[]).forEach(x=>{ s.add(x[0]); s.add(x[1]); s.add(x[2]); });
      let cars=[...s].filter(v=>v!=null).sort((a,b)=>a-b);
      if(!cars.length && g.field_size){ for(let i=1;i<=g.field_size;i++) cars.push(i); }
      return cars;
    }
    function renderOmGrid(uid, A){
      const g=omReg[uid]||{}; const combos=g.combos||[];
      const cars=omCars(uid).filter(c=>c!==A);
      const map={};
      combos.forEach(x=>{ if(x[0]===A) map[x[1]+"-"+x[2]]=x; });
      const head=`<th class="om-corner">2着＼3着</th>`+cars.map(c=>`<th>${carChip(c)}</th>`).join("");
      const body=cars.map(row=>{
        const tds=cars.map(col=>{
          if(row===col) return `<td><div class="om-cell dead">—</div></td>`;
          const x=map[row+"-"+col];
          const odds=x?x[3]:null, prob=x?x[4]:null, ev=x?x[5]:null;
          if(odds==null) return `<td><div class="om-cell na">—</div></td>`;
          const hi = ev!=null && ev>1;
          return `<td><div class="om-cell${hi?' hi':''}">`
            +`<span class="o">${(+odds).toFixed(1)}</span>`
            +`<span class="p">${prob!=null?(prob*100).toFixed(1)+"%":""}</span>`
            +(hi?`<span class="e">EV${ev.toFixed(2)}</span>`:"")
            +`</div></td>`;
        }).join("");
        return `<tr><th class="om-rh">${carChip(row)}</th>${tds}</tr>`;
      }).join("");
      return `<table class="om-t"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }
    function omBlock(r){
      const uid=omUid++;
      const combos=r.combos||[];
      omReg[uid]={combos, field_size:r.field_size||0};
      const firstCars=omCars(uid).filter(c=>combos.some(x=>x[0]===c));
      if(!combos.length || !firstCars.length){
        return `<div class="pred-tfhead">三連単 オッズテーブル</div><div class="om-none">オッズテーブルは未生成</div>`;
      }
      const topCar = (r.riders&&r.riders[0])?r.riders[0].car:null;
      const initCar = firstCars.includes(topCar)?topCar:firstCars[0];
      const tabs=firstCars.map(c=>`<button class="om-tab" type="button" role="tab" data-om="${uid}" data-car="${c}"`
        +` aria-selected="${c===initCar?"true":"false"}" tabindex="${c===initCar?0:-1}"`
        +` aria-label="1着 ${c}番を固定">${carChip(c)}</button>`).join("");
      // 毎回参照する情報のため常時表示（アコーディオンにしない）。
      return `<div class="om">`
        +`<div class="om-head"><span class="om-ttl">🔢 三連単オッズテーブル</span>`
        +`<span class="om-lab" id="om-lab-${uid}">1着 ${initCar} 固定</span></div>`
        +`<div class="om-body">`
        +`<div class="om-sel" role="tablist" aria-label="1着車の固定"><span class="om-sellab">1着固定</span>${tabs}</div>`
        +`<div class="tblwrap"><div id="om-grid-${uid}">${renderOmGrid(uid,initCar)}</div></div>`
        +`<div class="om-legend"><span><span class="om-sw"></span>期待値1超（モデル確率＞市場オッズ）</span>`
        +`<span>—＝未発売／不成立</span></div>`
        +`<div class="pred-ev-note">セル＝三連単オッズ（上）＋モデル確率（下）。色付き＝モデル確率に対しオッズが高いセル（EV&gt;1）。`
        +`確率と市場オッズの比較であり、エッジ確立・買い目推奨ではありません。</div>`
        +`</div></div>`;
    }

    function raceHead(r){
      const top1 = (r.riders&&r.riders.length)?(r.riders[0].win_prob||0):0;
      return `<div class="pred-rhead">`
        +`<span class="pred-rno">${r.race_no!=null?r.race_no:"?"}<small>R</small></span>`
        +`<span class="rtag ${rtagCls(r.race_type)}">${esc(r.race_type||"—")}</span>`
        +(r.is_girls?`<span class="badge sample">ガールズ</span>`:"")
        +(r.field_size?`<span class="pred-dl">${r.field_size}車</span>`:"")
        +(r.deadline?`<span class="pred-dl">締切 ${esc(r.deadline)}</span>`:"")
        +(r.updated_at?`<span class="pred-rupd">更新 ${esc(String(r.updated_at).slice(11,16)||r.updated_at)}</span>`:"")
        +`<span class="pred-src">${esc(r.source||"")}</span>`
        +`</div>`
        +`<div class="pred-top1">1着確率トップ <b>${pct1(top1)}</b>　正規化エントロピー <b>${r.entropy!=null?r.entropy.toFixed(2):"—"}</b></div>`;
    }
    // 予測タブの中身（出走表・対戦・三連単モデル確率・EV買い目・オッズテーブル）
    function predContent(r){
      const tf = (r.top_trifecta||[]).map(t=>{
        const cover = (t.odds!=null && t.odds<9999 && t.need_odds!=null && t.odds>=t.need_odds);
        return `<tr><td class="l combo">${esc(t.combo)}</td>`
          +`<td>${pct1(t.prob)}</td>`
          +`<td>${oddsF(t.need_odds)}</td>`
          +`<td class="${cover?'oddson':''}">${oddsCell(t.odds)}</td></tr>`;
      }).join("");
      const tfBlock = tf
        ? `<div class="pred-tfhead">三連単 モデル確率 上位</div>`
          +`<div class="tblwrap"><table class="t"><thead><tr>`
          +`<th class="l">着順</th><th>モデル確率</th><th>必要オッズ</th><th>市場オッズ</th>`
          +`</tr></thead><tbody>${tf}</tbody></table></div>` : "";
      return riderTable(r) + devBlock(r) + h2hBlock(r) + tfBlock + refBlock(r) + evBlock(r) + omBlock(r);
    }
    // 展開予想（記者の並び予想=車番のみ1行 ＋ 明示的な展開パターン複数）。出走表と対戦成績の間。
    function devBlock(r){
      const D = r.development;
      if(!D) return "";
      // 並び予想: 車番のみ・1行（スペース節約。選手名/脚質は出走表参照）
      const chips = (D.line||[]).map((s,i)=>{
        const arrow = i>0 ? `<span class="dev-arrow">▶</span>` : "";
        const favB = s.is_fav ? `<span class="dev-fav">◎</span>` : "";
        return `${arrow}<span class="dev-node">${favB}${carChip(s.car)}</span>`;
      }).join("");
      const narabi = (D.line||[]).length
        ? `<div class="dev-narabi-h">並び予想（左=先頭・車番のみ）</div><div class="dev-line">${chips}</div>` : "";
      // 明示的な展開パターン（複数・確率付き）
      const pats = (D.patterns||[]).map(p=>{
        const favB = p.has_fav ? `<span class="dev-fav">◎</span>` : "";
        return `<div class="dev-pat"><span class="dev-pat-i">${esc(p.icon||"")}</span>`
          +`<span class="dev-pat-l">${esc(p.label)}</span>`
          +`<span class="dev-pat-p">${(p.prob*100).toFixed(0)}%</span>`
          +`<span class="dev-pat-c">主役 ${carChip(p.lead_car)}${favB}</span></div>`;
      }).join("");
      const patBlock = pats
        ? `<div class="dev-pat-h">展開パターン（勝者の隊列位置で1着確率を分解）</div><div class="dev-pats">${pats}</div>` : "";
      // 推定主導権（展開AI＝最終バック先頭B。記者予想より当たる）
      const B = D.backstretch;
      let bsBlock = "";
      if(B && B.lead_car!=null){
        const sec = (B.second_car!=null)
          ? ` <span class="dev-bs-2">2番手候補 ${carChip(B.second_car)} ${(B.second_p*100).toFixed(0)}%</span>` : "";
        const div = B.diverges
          ? `<span class="dev-div">⚠ 記者予想先頭(${B.reporter_front}番)と相違</span>`
          : `<span class="dev-agree">✓ 記者予想先頭と一致</span>`;
        const fade = (D.pace && D.pace.level==="ハイ") ? ` <span class="dev-div">⚠ ハイペースで垂れ注意</span>` : "";
        bsBlock = `<div class="dev-pat-h">推定主導権（展開AI・最終バック先頭B）</div>`
          +`<div class="dev-bs">主導権 ${carChip(B.lead_car)} <b>${(B.lead_p*100).toFixed(0)}%</b>${sec}`
          +` <span class="dev-bs-hit">過去実測${(B.hit_rate*100).toFixed(0)}%的中（記者22%）</span></div>`
          +`<div class="dev-bs-div">${div}${fade}</div>`;
      }
      // ペース読み（先行型の数→ペース→決まり手傾向。表示専用）
      const P = D.pace;
      let paceBlock = "";
      if(P && P.level){
        const km = P.kimarite_hint||{};
        const lv = P.level==="ハイ" ? "hi" : (P.level==="ミドル" ? "mid" : "lo");
        paceBlock = `<div class="dev-pat-h">ペース読み</div>`
          +`<div class="dev-pace"><span class="dev-pace-lv lv-${lv}">${esc(P.level)}ペース</span>`
          +` <span class="dev-pace-n">先行型 ${P.n_front}人</span>`
          +` <span class="dev-pace-note">${esc(P.note||"")}</span></div>`
          +`<div class="dev-pace-km">決まり手の目安　逃 ${km["逃"]}%／捲 ${km["捲"]}%／差 ${km["差"]}%</div>`
          +(P.b_reliability?`<div class="dev-pace-km">主導権の信頼度　連対 ${P.b_reliability.rentai}%・着外 ${P.b_reliability.gaiji}% — ${esc(P.b_reliability.note||"")}</div>`:"");
      }
      return `<div class="dev">`
        +`<div class="dev-head">🔀 展開予想 <span class="dev-src">${esc(D.source||"")}</span></div>`
        +narabi + bsBlock + paceBlock + patBlock
        +(D.note?`<div class="dev-note">${esc(D.note)}</div>`:"")
        +(D.caveat?`<div class="dev-caveat">※ ${esc(D.caveat)}</div>`:"")
        +`</div>`;
    }
    // 参考フォーメーション（◎頭固定・補正確率top-K）。実弾非推奨・回収率<100%。
    function refBlock(r){
      const R = r.reference;
      if(!R || !(R.combos||[]).length) return "";
      const pk = (R.pockets||[]).length
        ? (R.pockets||[]).map(p=>`<span class="rf-pk">${esc(p)}</span>`).join("")
        : `<span class="rf-pk none">妙味ポケット外</span>`;
      const combos = (R.combos||[]).map(c=>`<span class="rf-combo">${esc(c)}</span>`).join("");
      const hist = Object.keys(R.hist||{}).sort((a,b)=>(+a)-(+b)).map(k=>{
        const h = R.hist[k];
        return `<tr><td>${k}点</td><td>${(+h.hit).toFixed(1)}%</td><td>${(+h.roi).toFixed(1)}%</td></tr>`;
      }).join("");
      return `<div class="rf">`
        +`<div class="rf-head">🧭 参考フォーメーション（◎頭固定・${R.points}点） ${pk}</div>`
        +`<div class="rf-combos">${combos}</div>`
        +(R.model_hit_pct!=null?`<div class="rf-model">このレースのモデル想定的中率（${R.points}点合計）: <b>${(+R.model_hit_pct).toFixed(1)}%</b></div>`:"")
        +`<div class="rf-hist"><div class="rf-hist-t">過去実測（${esc(R.primary)}・ポケット平均, out-of-sample）</div>`
        +`<div class="tblwrap"><table class="t"><thead><tr><th>点数</th><th>的中率</th><th>回収率</th></tr></thead><tbody>${hist}</tbody></table></div></div>`
        +`<div class="rf-note">⚠️ ${esc(R.note||"")} <b>回収率は全て100%未満＝実弾投入は非推奨</b>。的中率で点数を選ぶ“参考”用です。</div>`
        +`</div>`;
    }
    // 1レースのブロック。結果確定後は「予測／確定結果」をタブで分ける（tab: 'pred'|'res'）。
    function raceBlock(r, tab){
      const hasRes = !!(r.result && (r.result.order||[]).length);
      let inner;
      if(hasRes){
        const t = tab==="res" ? "res" : "pred";
        inner = `<div class="rc-tabs" role="tablist" aria-label="予測と結果の切替">`
          +`<button class="rc-tab" type="button" role="tab" data-rc="pred" aria-selected="${t==="pred"}" tabindex="${t==="pred"?0:-1}">予測</button>`
          +`<button class="rc-tab" type="button" role="tab" data-rc="res" aria-selected="${t==="res"}" tabindex="${t==="res"?0:-1}">🏁 確定結果</button>`
          +`</div>`
          +`<div class="rc-pane"${t==="res"?" hidden":""}>${predContent(r)}</div>`
          +`<div class="rc-pane"${t==="res"?"":" hidden"}>${resultBlock(r)}</div>`;
      } else {
        inner = predContent(r);
      }
      return `<div class="pred-race">${raceHead(r)}${inner}</div>`;
    }

    // 本日のハイライト（妙味サマリ）: 全レース横断で本命・1着確率・妙味シグナルを締切順で一覧化
    function highlightCard(){
      const sorted = races.slice().sort((a,b)=>
        String(a.deadline||"~~~~~").localeCompare(String(b.deadline||"~~~~~")));
      const rows = sorted.map(r=>{
        const rd0 = (r.riders&&r.riders[0])||{};
        const top1 = r.top1_prob!=null ? r.top1_prob : (rd0.win_prob||0);
        // 妙味＝win_ev>1（市場がその車の勝ちを過小評価）の車数
        const spice = (r.riders||[]).filter(x=>x.win_ev!=null && x.win_ev>1).length;
        // ev>1 の三連単の最大EV（combos: [1着,2着,3着,オッズ,確率,EV]）
        let maxEv = null;
        (r.combos||[]).forEach(c=>{ const e=c&&c[5]; if(e!=null && e>1 && (maxEv==null||e>maxEv)) maxEv=e; });
        const spiceTag = spice>0
          ? `<span class="hl-spice">妙味 ${spice}車</span>`
          : `<span class="hl-spice none">—</span>`;
        const evTxt = maxEv!=null ? `<span class="hl-ev">EV${maxEv.toFixed(2)}</span>`
          : `<span class="hl-ev none">—</span>`;
        return `<tr>`
          +`<td class="l">${esc(r.venue||"—")}</td>`
          +`<td><b>${r.race_no!=null?r.race_no:"?"}</b>R</td>`
          +`<td>${r.deadline?esc(r.deadline):"—"}</td>`
          +`<td class="l"><span class="hl-honmei">${carChip(rd0.car)}<span class="nm">${esc(rd0.name||"")}</span></span></td>`
          +`<td>${pct1(top1)}</td>`
          +`<td class="l"><span class="rtag ${rtagCls(r.race_type)}">${esc(r.race_type||"—")}</span></td>`
          +`<td>${spiceTag}</td>`
          +`<td>${evTxt}</td></tr>`;
      }).join("");
      const nSpice = races.filter(r=>(r.riders||[]).some(x=>x.win_ev!=null && x.win_ev>1)).length;
      return `<div class="hl-card">`
        +`<div class="hl-head"><span class="hl-title">✨ 本日のハイライト</span>`
        +`<span class="hl-count">${races.length}レース ／ 妙味シグナル ${nSpice}レース</span></div>`
        +`<p class="hl-note">合成オッズ&gt;必要オッズ（各車の勝ち）・EV&gt;1（三連単）は「モデル確率＞市場」の乖離を示す<b>参考値</b>で、`
        +`エッジ未確立・買い目推奨ではありません（上の免責を参照）。</p>`
        +`<div class="tblwrap"><table class="t"><thead><tr>`
        +`<th class="l">会場</th><th>R</th><th>締切</th><th class="l">本命</th><th>1着確率</th>`
        +`<th class="l">タイプ</th><th>妙味</th><th>最大三連単EV</th>`
        +`</tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }

    // 列の表示/並び替え設定パネル（チェックで表示ON/OFF・▲▼で並び替え。端末に保存）
    function cfgBar(){
      const items = cfg.order.map((k,idx)=>{
        const c=colByKey[k], on=!cfg.hidden.includes(k);
        return `<li class="cc-item">`
          +`<label class="cc-chk"><input type="checkbox" data-cc-tog="${k}"${on?" checked":""}>`
          +`<span>${esc(c.label)}</span></label>`
          +`<span class="cc-move">`
          +`<button type="button" class="cc-btn" data-cc-up="${k}"${idx===0?" disabled":""} aria-label="${esc(c.label)}を上へ">▲</button>`
          +`<button type="button" class="cc-btn" data-cc-down="${k}"${idx===cfg.order.length-1?" disabled":""} aria-label="${esc(c.label)}を下へ">▼</button>`
          +`</span></li>`;
      }).join("");
      return `<details class="cc"${cfgOpen?" open":""} id="predCfg">`
        +`<summary aria-label="表示する列と並び順の設定"><span class="cc-ttl">⚙ 表示する列・並び順</span>`
        +`<span class="cc-hint">車・選手は常時表示</span><span class="chev">▸</span></summary>`
        +`<div class="cc-body"><ul class="cc-list">${items}</ul>`
        +`<div class="cc-actions"><button type="button" class="cc-reset" id="ccReset">既定に戻す</button></div>`
        +`<p class="cc-note">チェックで表示/非表示、▲▼で並び替え。設定はこの端末に保存され、全レースの出走表に反映されます。</p>`
        +`</div></details>`;
    }

    let cfgOpen = false, selVenue = 0, selRace = 0, raceTabOverride = null;
    const venues = [...byVenue.keys()];
    // 会場を「最も早い締切」の時刻順（開催時間順）に並べる
    const vMinDeadline = v => {
      const ds = (byVenue.get(v)||[]).map(r=>r.deadline).filter(x=>x && String(x).includes(":"));
      return ds.length ? ds.slice().sort()[0] : "99:99";
    };
    venues.sort((a,b)=> vMinDeadline(a).localeCompare(vMinDeadline(b)));

    function render(){
      let html = `<div class="pred-disc">⚠ これは各車の着順（1着）確率と三連単モデル確率の提示です。`
        +`${esc(P.note||"")} 買い目の推奨ではありません。</div>`;
      if(P.last_updated){
        html += `<div class="pred-updated"><span class="lu">最終更新 <b>${esc(P.last_updated)}</b></span>`
          +`<span>発走10分前に最新オッズで自動更新されます。</span></div>`;
      }
      html += cfgBar();
      html += highlightCard();
      if(selVenue>=venues.length) selVenue=0;
      // 会場タブ（開催時間順）
      const vtabs = venues.map((v,i)=>
        `<button class="pred-vtab" type="button" role="tab" data-venue="${i}"`
        +` aria-selected="${i===selVenue?"true":"false"}" tabindex="${i===selVenue?0:-1}">`
        +`${esc(v)}<span class="vc">${byVenue.get(v).length}R</span></button>`).join("");
      // 選択会場のレースを開催時間順に並べ、レース番号タブを出す
      const vraces = (byVenue.get(venues[selVenue])||[]).slice()
        .sort((a,b)=> String(a.deadline||"~~").localeCompare(String(b.deadline||"~~")) || ((a.race_no||0)-(b.race_no||0)));
      if(selRace>=vraces.length) selRace=0;
      const rtabs = vraces.map((r,j)=>
        `<button class="pred-rtab" type="button" role="tab" data-race="${j}"`
        +` aria-selected="${j===selRace?"true":"false"}" tabindex="${j===selRace?0:-1}">`
        +`<span class="rn">${r.race_no!=null?r.race_no:"?"}R</span>`
        +(r.deadline?`<span class="dl">${esc(r.deadline)}</span>`:"")
        +(r.result&&(r.result.order||[]).length?`<span class="done">済</span>`:"")+`</button>`).join("");
      // 選択レースを1件だけ表示（予測／確定結果はタブ切替）
      const rc = vraces[selRace];
      const hasRes = !!(rc && rc.result && (rc.result.order||[]).length);
      const tab = hasRes ? (raceTabOverride || "res") : "pred";   // 確定済みは結果を既定表示
      const panel = rc ? `<div class="pred-rpanel"><div class="pred-vbox">${raceBlock(rc, tab)}</div></div>` : "";
      html += `<div class="pred-vtabs" role="tablist" aria-label="会場切替（開催時間順）">${vtabs}</div>`
        +`<div class="pred-rtabs" role="tablist" aria-label="レース切替">${rtabs}</div>`
        + panel;
      host.innerHTML = html;
      attachListeners();
    }

    function attachListeners(){
      // 列設定: 開閉状態の保持・表示切替・並び替え・リセット（変更後は再描画）
      const cc = host.querySelector("#predCfg");
      if(cc) cc.addEventListener("toggle",()=>{ cfgOpen = cc.open; });
      host.querySelectorAll("[data-cc-tog]").forEach(chk=>{
        chk.addEventListener("change",()=>{
          const k=chk.dataset.ccTog;
          if(chk.checked) cfg.hidden = cfg.hidden.filter(x=>x!==k);
          else if(!cfg.hidden.includes(k)) cfg.hidden.push(k);
          cfgOpen=true; saveCfg(); render();
        });
      });
      function move(k,dir){
        const i=cfg.order.indexOf(k), j=i+dir;
        if(i<0||j<0||j>=cfg.order.length) return;
        [cfg.order[i],cfg.order[j]]=[cfg.order[j],cfg.order[i]];
        cfgOpen=true; saveCfg(); render();
      }
      host.querySelectorAll("[data-cc-up]").forEach(b=>b.addEventListener("click",()=>move(b.dataset.ccUp,-1)));
      host.querySelectorAll("[data-cc-down]").forEach(b=>b.addEventListener("click",()=>move(b.dataset.ccDown,1)));
      const rst=host.querySelector("#ccReset");
      if(rst) rst.addEventListener("click",()=>{
        cfg={order:DEFAULT_ORDER.slice(), hidden:DEFAULT_HIDDEN.slice()};
        cfgOpen=true; saveCfg(); render();
      });

      // EV買い目: 1着車セレクタの切替（車番順表示）
      host.querySelectorAll(".ev-tab").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const uid=btn.dataset.ev, car=+btn.dataset.car;
          host.querySelectorAll(`.ev-tab[data-ev="${uid}"]`).forEach(b=>{
            const on=(+b.dataset.car===car);
            b.setAttribute("aria-selected", on?"true":"false");
            b.tabIndex = on?0:-1;
          });
          const grid=host.querySelector("#ev-grid-"+uid);
          if(grid) grid.innerHTML=renderEvGrid(uid,car);
        });
      });

      // 三連単オッズテーブル: 1着固定セレクタの切替
      host.querySelectorAll(".om-tab").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const uid=btn.dataset.om, car=+btn.dataset.car;
          host.querySelectorAll(`.om-tab[data-om="${uid}"]`).forEach(b=>{
            const on=(+b.dataset.car===car);
            b.setAttribute("aria-selected", on?"true":"false");
            b.tabIndex = on?0:-1;
          });
          const grid=host.querySelector("#om-grid-"+uid);
          if(grid) grid.innerHTML=renderOmGrid(uid,car);
          const lab=host.querySelector("#om-lab-"+uid);
          if(lab) lab.textContent="1着 "+car+" 固定";
        });
      });

      // 会場タブ（開催時間順）→ 選ぶとレースは先頭にリセット
      host.querySelectorAll(".pred-vtab").forEach(t=>{
        t.addEventListener("click",()=>{ selVenue=+t.dataset.venue; selRace=0; raceTabOverride=null; render(); });
      });
      // レース番号タブ → 単一レース表示に切替
      host.querySelectorAll(".pred-rtab").forEach(t=>{
        t.addEventListener("click",()=>{ selRace=+t.dataset.race; raceTabOverride=null; render(); });
      });
      // 予測／確定結果 タブ
      host.querySelectorAll(".rc-tab").forEach(t=>{
        t.addEventListener("click",()=>{ raceTabOverride=t.dataset.rc; render(); });
      });
      // タブの左右キー移動（会場・レース）
      function arrowNav(sel, pick){
        const els=[...host.querySelectorAll(sel)];
        els.forEach((el,i)=> el.addEventListener("keydown",e=>{
          let ni=null;
          if(e.key==="ArrowRight"||e.key==="ArrowDown") ni=(i+1)%els.length;
          else if(e.key==="ArrowLeft"||e.key==="ArrowUp") ni=(i-1+els.length)%els.length;
          else if(e.key==="Home") ni=0; else if(e.key==="End") ni=els.length-1;
          if(ni!=null){ e.preventDefault(); pick(ni);
            const now=host.querySelectorAll(sel)[ni]; if(now) now.focus(); }
        }));
      }
      arrowNav(".pred-vtab", i=>{ selVenue=i; selRace=0; raceTabOverride=null; render(); });
      arrowNav(".pred-rtab", i=>{ selRace=i; raceTabOverride=null; render(); });
    }

    render();
  })();

  // ---------- (a) recommendations ----------
  (function(){
    const R = DB.recommendations||{};
    document.getElementById("recTitle").innerHTML = "本日の推奨買い目 "+badge(R.status);
    document.getElementById("recSub").textContent =
      (R.date?`対象日 ${R.date}　`:"") + (R.ev_threshold?`EV閾値 ${R.ev_threshold}　`:"") + (R.note||"");
    const host = document.getElementById("recBody");
    const bets = R.bets||[];
    if(!isShown(R.status) || !bets.length){
      host.innerHTML = emptyBox(R.status==="none"
        ? "本日は対象バケット内でEV閾値を超える買い目がありません（見送り）。"
        : "モデル未学習のため推奨買い目は未算出です。学習後、対象バケット内でEV閾値を超えた買い目がここに表示されます。");
      return;
    }
    const totStake = bets.reduce((s,b)=>s+(b.stake||0),0);
    const rows = bets.map(b=>{
      const evlo = (b.ev!=null && b.ev<1.15) ? " lo":"";
      return `<tr>`
        +`<td class="l">${esc(b.venue||"")} <b>${b.race_no!=null?b.race_no+"R":""}</b>${b.post_time?`<br><span style="color:var(--muted);font-size:.9em">${esc(b.post_time)}</span>`:""}</td>`
        +`<td class="l"><span class="rtag ${rtagCls(b.race_type)}">${esc(b.race_type||"—")}</span></td>`
        +`<td class="l combo">${esc(b.combo)}</td>`
        +`<td>${pct1(b.model_prob)}</td>`
        +`<td>${oddsF(b.fair_odds)}</td>`
        +`<td>${oddsF(b.market_odds)}</td>`
        +`<td class="evp${evlo}">${b.ev!=null?b.ev.toFixed(2):"—"}</td>`
        +`<td>${yen(b.stake)}</td></tr>`;
    }).join("");
    host.innerHTML = `<div class="tblwrap"><table class="t"><thead><tr>`
      +`<th class="l">レース</th><th class="l">タイプ</th><th class="l">買い目</th>`
      +`<th>モデル確率</th><th>必要オッズ</th><th>市場オッズ</th><th>EV</th><th>推奨投票額</th>`
      +`</tr></thead><tbody>${rows}`
      +`<tr class="tfoot-row"><td class="l" colspan="7">合計 ${bets.length}点</td><td>${yen(totStake)}</td></tr>`
      +`</tbody></table></div>`
      +`<div class="note">必要オッズ＝モデル確率の逆数（1/p）。市場オッズがこれを上回るとEV&gt;1。EV=市場ブレンド確率×haircut後オッズ。推奨投票額は quarter Kelly。</div>`;
  })();

  // ---------- (b) buckets ----------
  let bktView = "heat";
  const B = DB.buckets||{};
  function cellOf(rt,ob){ return (B.cells||[]).find(c=>c.race_type===rt && c.odds_band===ob); }
  function renderBuckets(){
    document.getElementById("bktTitle").innerHTML = "バケット別 累積ROI（レースタイプ×オッズ帯）"+badge(B.status);
    document.getElementById("bktSub").textContent = B.note||"";
    const host = document.getElementById("bktBody");
    const cells=B.cells||[];
    if(!isShown(B.status) || !cells.length){
      host.innerHTML = emptyBox("バケット分析は未算出です。過去レースを（レースタイプ×オッズ帯）で分割し、EV閾値超えの機械的全買いの実現ROIを集計するとここに表示されます。100%超のゾーンのみ実運用対象。");
      return;
    }
    const RT=B.race_types||[], OB=B.odds_bands||[];
    if(bktView==="table"){
      const rows = cells.map(c=>`<tr>`
        +`<td class="l"><span class="rtag ${rtagCls(c.race_type)}">${esc(c.race_type)}</span></td>`
        +`<td class="l">${esc(c.odds_band)}</td>`
        +`<td>${c.n||0}</td><td>${c.hits||0}</td>`
        +`<td>${yen(c.stake)}</td><td>${yen(c.return)}</td>`
        +`<td style="color:${roiTextCol(c.roi)};font-weight:800">${c.roi!=null?pctR(c.roi):"—"}</td></tr>`).join("");
      host.innerHTML = `<div class="tblwrap"><table class="t"><thead><tr>`
        +`<th class="l">タイプ</th><th class="l">オッズ帯</th><th>点数</th><th>的中</th><th>投資</th><th>払戻</th><th>ROI</th>`
        +`</tr></thead><tbody>${rows}</tbody></table></div>`
        +`<div class="note">ROI100%超（緑）が実運用の候補ゾーン。点数が少ないバケットは統計的に不安定なので注意。</div>`;
      return;
    }
    // heatmap
    const th = `<th class="l">タイプ＼オッズ帯</th>`+OB.map(o=>`<th>${esc(o)}</th>`).join("");
    const rows = RT.map(rt=>{
      const tds = OB.map(ob=>{
        const c=cellOf(rt,ob);
        if(!c || c.roi==null || !c.n) return `<td><div class="hcell empty">—</div></td>`;
        return `<td><div class="hcell" style="background:${roiColor(c.roi)}">`
          +`<span class="r" style="color:${roiTextCol(c.roi)}">${pctR(c.roi)}</span><span class="n">${c.n}点</span></div></td>`;
      }).join("");
      return `<tr><td class="l"><span class="rtag ${rtagCls(rt)}">${esc(rt)}</span></td>${tds}</tr>`;
    }).join("");
    host.innerHTML = `<div class="hmwrap"><table class="hm"><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table></div>`
      +`<div class="legend"><span>ROI:</span>`
      +`<span><span class="sw" style="background:${roiColor(0.6)}"></span>60%（赤字）</span>`
      +`<span><span class="sw" style="background:${roiColor(1.0)}"></span>100%（分岐）</span>`
      +`<span><span class="sw" style="background:${roiColor(1.3)}"></span>130%（黒字）</span>`
      +`<span><span class="sw" style="background:var(--surface2);border:1px solid var(--border)"></span>データなし</span></div>`
      +`<div class="note">セル＝そのバケットの実現ROI（濃い緑＝黒字ゾーン＝実運用候補）＋サンプル点数。斜線／—＝データなし。</div>`;
  }
  document.querySelectorAll("#bktToggle button").forEach(b=>b.addEventListener("click",()=>{
    bktView=b.dataset.v;
    document.querySelectorAll("#bktToggle button").forEach(x=>x.setAttribute("aria-pressed",x===b));
    renderBuckets();
  }));

  // ---------- (c) race type distribution ----------
  (function(){
    const D = DB.race_type_dist||{};
    document.getElementById("distTitle").innerHTML = "レースタイプ分布 "+badge(D.status);
    document.getElementById("distSub").textContent = D.note||"";
    const host=document.getElementById("distBody");
    const counts=D.counts||[];
    if(!isShown(D.status) || !counts.length){
      host.innerHTML = emptyBox("レースタイプ分類は未算出です。確率分布の形状から軸堅／標準／混戦を判定した分布がここに表示されます。");
      return;
    }
    const total = counts.reduce((s,c)=>s+(c.n||0),0)||1;
    const mx = Math.max(...counts.map(c=>c.n||0),1);
    const rows = counts.map(c=>{
      const w=Math.round((c.n||0)/mx*100), share=(c.n||0)/total;
      const col = c.type==="軸堅"?"var(--good)":(c.type==="混戦"?"var(--accent)":"var(--edge)");
      return `<div class="barrow"><span class="bl"><span class="dot-sw" style="background:${col}"></span>`
        +`<span class="rtag ${rtagCls(c.type)}">${esc(c.type)}</span></span>`
        +`<span class="bartrack"><span class="barfill" style="width:${w}%;background:${col}"></span></span>`
        +`<span class="bv">${(c.n||0).toLocaleString()}<br><span style="color:var(--muted);font-weight:600;font-size:.85em">${pctR(share)}</span></span></div>`;
    }).join("");
    host.innerHTML = `<div class="card">${rows}<div class="note">全${total.toLocaleString()}レースの分類。軸堅＝軸が明確／標準＝中間／混戦＝抜けた選手なし・波乱含み。</div></div>`;
  })();

  // ---------- (d) calibration (reliability) ----------
  (function(){
    const C = DB.calibration||{};
    document.getElementById("calTitle").innerHTML = "キャリブレーション（予測 vs 実現）"+badge(C.status);
    document.getElementById("calSub").textContent = C.note||"";
    const host=document.getElementById("calBody");
    // data.json の bins は 1着確率の較正: mean_pred / emp_freq（0〜1）。%へ正規化して描画。
    const bins=(C.bins||[]).map(b=>({
      pred: b.mean_pred!=null ? b.mean_pred*100 : null,
      actual: b.emp_freq!=null ? b.emp_freq*100 : null,
      n: b.n||0,
    }));
    const hasPts = bins.some(b=>b.pred!=null && b.actual!=null);
    if(!isShown(C.status) || !hasPts){
      host.innerHTML = emptyBox("キャリブレーション検証は未算出です。予測1着確率と実現確率の対応（reliability curve）と Brier score がここに表示されます。");
      return;
    }
    // 1着確率の較正は 0〜100% レンジ。実データの最大値でスケール。
    const maxV = Math.max(2, ...bins.map(b=>Math.max(b.pred||0,b.actual||0)));
    const axMax = Math.ceil(maxV/2)*2;
    const W=320,H=250,pad=34;
    const sx=v=>pad+(v/axMax)*(W-pad-10), sy=v=>H-pad-(v/axMax)*(H-pad-12);
    let g=`<line x1="${sx(0)}" y1="${sy(0)}" x2="${sx(axMax)}" y2="${sy(axMax)}" stroke="var(--muted)" stroke-dasharray="4 3" stroke-width="1"/>`;
    g+=`<line x1="${pad}" y1="${sy(0)}" x2="${W-10}" y2="${sy(0)}" stroke="var(--border)"/>`;
    g+=`<line x1="${pad}" y1="${sy(0)}" x2="${pad}" y2="10" stroke="var(--border)"/>`;
    const ticks=[0,axMax/2,axMax];
    ticks.forEach(t=>{ g+=`<text x="${sx(t)}" y="${H-pad+14}" font-size="9" fill="var(--muted)" text-anchor="middle">${t}%</text>`;
      g+=`<text x="${pad-5}" y="${sy(t)+3}" font-size="9" fill="var(--muted)" text-anchor="end">${t}%</text>`; });
    const mn=Math.max(...bins.map(b=>b.n||1),1);
    // connecting line through points
    const pts=bins.filter(b=>b.pred!=null&&b.actual!=null).map(b=>`${sx(b.pred).toFixed(1)},${sy(b.actual).toFixed(1)}`).join(" ");
    g+=`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>`;
    bins.forEach(b=>{ if(b.pred==null||b.actual==null) return;
      const r=4+7*Math.sqrt((b.n||1)/mn);
      g+=`<circle cx="${sx(b.pred)}" cy="${sy(b.actual)}" r="${r.toFixed(1)}" fill="var(--accent)" opacity="0.72"/>`; });
    g+=`<text x="${W/2}" y="${H-4}" font-size="9.5" fill="var(--muted)" text-anchor="middle">予測1着確率 %</text>`;
    g+=`<text x="11" y="${H/2}" font-size="9.5" fill="var(--muted)" text-anchor="middle" transform="rotate(-90 11 ${H/2})">実現1着率 %</text>`;
    const svg=`<svg class="tksvg" viewBox="0 0 ${W} ${H}" role="img" aria-label="キャリブレーション曲線">${g}</svg>`;
    const nTot = bins.reduce((s,b)=>s+(b.n||0),0);
    const brier = C.brier!=null
      ? `<div class="kpi"><div class="kl">Brier score</div><div class="kv">${C.brier.toFixed(4)}</div><div class="kn">低いほど良い（0が完全）</div></div>`
      : "";
    const nkpi = nTot
      ? `<div class="kpi"><div class="kl">検証サンプル</div><div class="kv">${nTot.toLocaleString()}</div><div class="kn">1着確率の予測 vs 実現</div></div>`
      : "";
    host.innerHTML = `<div class="kpirow">${brier}${nkpi}</div>${svg}`
      +`<div class="note">点＝予測1着確率帯（大きさ＝サンプル数）。対角線に近いほど正確。線より下＝過信（予測ほど当たっていない）、上＝過小評価。検証期間の各車1着確率で集計。</div>`;
  })();

  // ---------- (d2) prediction accuracy ----------
  (function(){
    const A = DB.prediction_accuracy||{};
    document.getElementById("accTitle").innerHTML = "予測実績（検証期間）"+badge(A.status);
    document.getElementById("accSub").textContent = A.note||"";
    const host=document.getElementById("accBody");
    if(!isShown(A.status)){ host.innerHTML = emptyBox("予測実績は未算出です。検証期間でモデル予測を実結果と照合した的中率がここに表示されます。"); return; }
    const kpi=(l,v,n)=>`<div class="kpi"><div class="kl">${l}</div><div class="kv">${v}</div><div class="kn">${n}</div></div>`;
    const tri=(A.trifecta||[]).map(t=>`<tr><td class="l">モデル上位${t.topn}に的中</td><td>${(t.rate*100).toFixed(1)}%</td></tr>`).join("");

    // (d2b) 週次推移ミニチャート: 検証期間を ISO週で区切った 1着的中率/上位3内率 + 週レース数
    const H2 = DB.accuracy_history||{};
    const wk = H2.weeks||[];
    let histHtml = "";
    if(isShown(H2.status) && wk.length){
      const W=340,H=200,padL=30,padR=10,padT=14,padB=34;
      const n=wk.length, plotB=H-padB, plotT=padT;
      const sx=i=>padL+(n>1?(i/(n-1))*(W-padL-padR):(W-padL-padR)/2);
      const sy=v=>plotB-(v/100)*(plotB-plotT);        // v は %（0〜100）
      const maxN=Math.max(...wk.map(w=>w.n_races||0),1);
      let g="";
      [0,50,100].forEach(t=>{
        g+=`<line x1="${padL}" y1="${sy(t)}" x2="${W-padR}" y2="${sy(t)}" stroke="var(--border2)" stroke-width="1"/>`;
        g+=`<text x="${padL-4}" y="${sy(t)+3}" font-size="9" fill="var(--muted)" text-anchor="end">${t}%</text>`;
      });
      // 週レース数を下部バンドの薄い棒で（週ごとのサンプル量＝振れやすさの目安）
      const volH=(plotB-plotT)*0.22, bw=Math.max(2,Math.min(10,(W-padL-padR)/n*0.6));
      wk.forEach((w,i)=>{ const h=((w.n_races||0)/maxN)*volH;
        g+=`<rect x="${(sx(i)-bw/2).toFixed(1)}" y="${(plotB-h).toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="var(--muted)" opacity="0.16"/>`; });
      const line=(key,col)=>`<polyline points="${wk.map((w,i)=>`${sx(i).toFixed(1)},${sy((w[key]||0)*100).toFixed(1)}`).join(" ")}" fill="none" stroke="${col}" stroke-width="1.8"/>`;
      g+=line("top3_rate","var(--good)");
      g+=line("top1_rate","var(--accent)");
      if(n<=26){ wk.forEach((w,i)=>{
        g+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy((w.top3_rate||0)*100).toFixed(1)}" r="2" fill="var(--good)"/>`;
        g+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy((w.top1_rate||0)*100).toFixed(1)}" r="2" fill="var(--accent)"/>`; }); }
      const md=s=>{ const p=(s||"").split("-"); return p.length===3?p[1]+"/"+p[2]:s; };
      const idxs=n<=1?[0]:[0,Math.floor((n-1)/2),n-1];
      idxs.forEach(i=>{ g+=`<text x="${sx(i).toFixed(1)}" y="${H-padB+14}" font-size="9" fill="var(--muted)" text-anchor="middle">${esc(md(wk[i].week_start))}</text>`; });
      const svg=`<svg class="tksvg" viewBox="0 0 ${W} ${H}" role="img" aria-label="週次的中率の推移">${g}</svg>`;
      const legend=`<div class="note" style="margin-bottom:2px">`
        +`<span style="color:var(--accent)">●</span> 1着的中率　`
        +`<span style="color:var(--good)">●</span> 上位3内率　`
        +`<span style="color:var(--muted)">▮</span> 週レース数</div>`;
      histHtml = `<div style="margin-top:12px;font-size:.72rem;color:var(--muted);font-weight:700">週次推移（学習に使っていない直近区間）</div>`
        +legend+svg
        +`<div class="note">各点＝ISO週（月曜始まり）ごとの検証実績。線が水平に近いほどモデル精度が時間的に安定。棒＝その週のレース数（少ない週は振れやすい）。買い目推奨ではありません。</div>`;
    }

    host.innerHTML =
      `<div class="kpirow">`
      +kpi("1着的中率", (A.top1_rate*100).toFixed(1)+"%", "本命が1着")
      +kpi("3着内的中率", (A.top3_rate*100).toFixed(1)+"%", "実1着がモデル上位3車")
      +kpi("Brier", (A.brier!=null?A.brier.toFixed(4):"—"), "低いほど良い")
      +`</div>`
      +`<div class="tblwrap" style="margin-top:8px"><table class="t"><thead><tr><th class="l">三連単の的中（モデル確率順の上位に実着順が入った割合）</th><th>的中率</th></tr></thead><tbody>${tri}</tbody></table></div>`
      +`<div class="note">${esc(A.period||"")}・${(A.n_races||0).toLocaleString()}レース（学習に使っていない直近区間）でモデル予測を実結果と照合した実績。買い目推奨ではありません。</div>`
      +histHtml;
  })();

  // ---------- (d3) results history (成績: 過去1ヶ月の開催結果) ----------
  (function(){
    const RH = DB.results_history||{};
    document.getElementById("rhTitle").innerHTML = "成績（過去半年の開催結果）"+badge(RH.status);
    const races = RH.races||[];
    document.getElementById("rhSub").textContent =
      (RH.period?`期間 ${esc(RH.period)}　`:"") + (RH.n_races!=null?`${(+RH.n_races).toLocaleString()}レース`:"");
    const host = document.getElementById("rhBody");
    if(!isShown(RH.status) || !races.length){
      host.innerHTML = emptyBox("成績はまだ集計されていません。過去約半年の各レースについて、モデルの印(◎○▲△×)・決着印順・決着三連単のモデル確率順位・払戻がここに表示されます。");
      return;
    }
    // 車番→競走服の色（1白2黒3赤4青5黄6緑7橙8桃9紫）
    const CARCOL = {
      1:["#ffffff","#111"], 2:["#242424","#fff"], 3:["#e03131","#fff"],
      4:["#1c7ed6","#fff"], 5:["#f2d600","#111"], 6:["#2f9e44","#fff"],
      7:["#f76707","#fff"], 8:["#f06595","#fff"], 9:["#7048e8","#fff"]
    };
    const carChip = n => { const c=CARCOL[n]||["var(--surface2)","var(--ink)"];
      return `<span class="carno" style="background:${c[0]};color:${c[1]}">${esc(n)}</span>`; };

    const STEP = 50;
    let fType = "all", fVenue = "all", fMonth = "all";   // レースタイプ / 会場 / 月
    let shown = STEP;
    const venues = [...new Set(races.map(r=>r.venue).filter(Boolean))].sort();
    const months = [...new Set(races.map(r=>String(r.date||"").slice(0,7)).filter(Boolean))].sort().reverse();

    const finishCell = fin => `<div class="rh-fin">`
      + (fin||[]).map((f,i)=>`<span class="rh-leg${i===0?" top":""}">`
          +`<span class="rh-pos">${i+1}着</span>`
          +`<span class="rh-mk${i===0?" win":""}">${esc(f.mark||"−")}</span>`
          +carChip(f.car)
          +`<span class="rh-nm">${esc(f.name||"")}</span></span>`).join("")
      + `</div>`;
    const rankCell = tr => tr==null
      ? `<span class="rh-rank out">圏外</span>`
      : `<span class="rh-rank ${tr<=10?"hit":""}">${tr}位</span>`;
    const payCell = p => p==null ? "—"
      : `<span class="${p>=10000?"rh-big":""}">¥${(+p).toLocaleString()}</span>`;

    // 開催（日付・会場R・タイプ）を縦3段で1セルに
    const meta = r => `<div class="rh-meta">`
      +`<span class="rh-date">${esc(r.date||"—")}</span>`
      +`<span class="rh-ven">${esc(r.venue||"—")}<span class="rh-r">R${r.race_no!=null?r.race_no:"—"}</span></span>`
      +`<span class="rtag ${rtagCls(r.race_type)}">${esc(r.race_type||"—")}</span></div>`;

    function render(){
      const list = races.filter(r =>
        (fType==="all" || r.race_type===fType) &&
        (fVenue==="all" || r.venue===fVenue) &&
        (fMonth==="all" || String(r.date||"").slice(0,7)===fMonth));
      const slice = list.slice(0, shown);
      const rows = slice.map(r=>`<tr>`
        +`<td class="l">${meta(r)}</td>`
        +`<td class="l">${finishCell(r.finish)}${r.finish_marks?`<div class="rh-fm">(${esc(r.finish_marks)})</div>`:""}</td>`
        +`<td class="combo">${esc(r.win_combo||"—")}</td>`
        +`<td>${rankCell(r.tri_rank)}</td>`
        +`<td>${payCell(r.payout)}</td>`
        +`<td>${r.popularity!=null?esc(r.popularity)+"番人気":"—"}</td>`
        +`</tr>`).join("");
      const rest = list.length - slice.length;
      const more = rest>0
        ? `<div class="rh-morewrap"><button class="rh-more" type="button">もっと見る（残り ${rest.toLocaleString()}）</button></div>`
        : "";
      const venOpts = `<option value="all">全会場</option>`
        + venues.map(v=>`<option value="${esc(v)}"${v===fVenue?" selected":""}>${esc(v)}</option>`).join("");
      const monOpts = `<option value="all">全期間</option>`
        + months.map(m=>`<option value="${esc(m)}"${m===fMonth?" selected":""}>${esc(m)}</option>`).join("");
      host.innerHTML =
        `<div class="rh-tools"><div class="vtoggle" id="rhFilter">`
        + ["all","軸堅","標準","混戦"].map(t=>`<button data-f="${t}" aria-pressed="${t===fType?"true":"false"}">${t==="all"?"全":t}</button>`).join("")
        + `</div><select id="rhVenue" class="rh-sel" aria-label="会場で絞り込み">${venOpts}</select>`
        + `<select id="rhMonth" class="rh-sel" aria-label="月で絞り込み">${monOpts}</select>`
        + `<span class="rh-count">${list.length.toLocaleString()}レース</span></div>`
        + `<div class="tblwrap"><table class="t rh-t"><thead><tr>`
        + `<th class="l">開催</th><th class="l">決着（印順）</th><th>三連単</th><th>モデル予測順位</th><th>払戻</th><th>人気</th>`
        + `</tr></thead><tbody>${rows}</tbody></table></div>`
        + more
        + `<div class="note">印＝モデルの1着確率順（◎1位 ○2位 ▲3位 △4位 ×5位 −6位以降）。決着（印順）＝実際の1→2→3着の車と、その車に付いていた印。モデル予測順位＝決着した三連単がモデルの三連単確率（全210通り）で何位か。10位以内は<b style="color:var(--good)">強調</b>、210通りに現れなかった着順は「圏外」。買い目推奨ではありません。</div>`;
      const fl = document.getElementById("rhFilter");
      if(fl) fl.addEventListener("click", e=>{ const b=e.target.closest("button"); if(!b) return;
        fType=b.dataset.f; shown=STEP; render(); });
      const vs = document.getElementById("rhVenue");
      if(vs) vs.addEventListener("change", ()=>{ fVenue=vs.value; shown=STEP; render(); });
      const ms = document.getElementById("rhMonth");
      if(ms) ms.addEventListener("change", ()=>{ fMonth=ms.value; shown=STEP; render(); });
      const mb = host.querySelector(".rh-more");
      if(mb) mb.addEventListener("click", ()=>{ shown+=STEP; render(); });
    }
    render();
  })();

  // ---------- (e) cumulative ROI ----------
  (function(){
    const P = DB.cumulative_roi||{};
    document.getElementById("pnlTitle").innerHTML = "全体 累積ROI 推移 "+badge(P.status);
    document.getElementById("pnlSub").textContent = P.note||"";
    const host=document.getElementById("pnlBody");
    const pts=P.points||[];
    if(!isShown(P.status) || !pts.length){
      host.innerHTML = emptyBox("累積ROIは未算出です。対象バケット内でEV閾値を超えた買い目を quarter Kelly で購入した場合の累積損益がここに表示されます。");
      return;
    }
    const kpis = `<div class="kpirow">`
      +`<div class="kpi"><div class="kl">累積ROI</div><div class="kv ${P.final_roi>=1?'pos':'neg'}">${P.final_roi!=null?pctR(P.final_roi):"—"}</div><div class="kn">100%超で黒字</div></div>`
      +`<div class="kpi"><div class="kl">投資合計</div><div class="kv">${yen(P.total_stake)}</div><div class="kn">${pts.length}レース</div></div>`
      +`<div class="kpi"><div class="kl">払戻合計</div><div class="kv">${yen(P.total_return)}</div><div class="kn">損益 ${(P.total_return-P.total_stake>=0?'+':'')}${yen(P.total_return-P.total_stake).replace('¥','')}</div></div>`
      +`</div>`;
    // line chart cumulative net
    const W=340,H=170,pad=12;
    const cums=pts.map(p=>p.cum); const n=pts.length;
    const mn=Math.min(0,...cums), mx=Math.max(0,...cums), rng=(mx-mn)||1;
    const sx=i=>pad+(i/Math.max(n-1,1))*(W-2*pad), sy=v=>H-pad-((v-mn)/rng)*(H-2*pad);
    let g=`<line x1="${pad}" y1="${sy(0)}" x2="${W-pad}" y2="${sy(0)}" stroke="var(--muted)" stroke-dasharray="3 3" stroke-width="1"/>`;
    const last=cums[n-1], col=last>=0?"var(--good)":"var(--loss)";
    // area fill
    g+=`<polyline points="${pts.map((p,i)=>`${sx(i).toFixed(1)},${sy(p.cum).toFixed(1)}`).join(" ")}" fill="none" stroke="${col}" stroke-width="2.5"/>`;
    pts.forEach((p,i)=>{ g+=`<circle cx="${sx(i).toFixed(1)}" cy="${sy(p.cum).toFixed(1)}" r="2.6" fill="${p.cum>=0?'var(--good)':'var(--loss)'}"/>`; });
    g+=`<text x="${W-pad}" y="14" font-size="11" fill="${col}" text-anchor="end" font-weight="800">${last>=0?'+':''}${last.toLocaleString()}円</text>`;
    host.innerHTML = kpis
      +`<svg class="tksvg" viewBox="0 0 ${W} ${H}" role="img" aria-label="累積損益">${g}</svg>`
      +`<div class="note">1点＝1購入レース。縦＝累積損益（円）、破線＝損益分岐。haircut後オッズ×的中で払戻した想定。実購入は行っていません。</div>`;
  })();

  // ---------- data status ----------
  (function(){
    const S = DB.data_status||{};
    document.getElementById("dsTitle").innerHTML = "データ収集状況 "+badge(S.status||"ok");
    document.getElementById("dsSub").textContent = "keirin.sqlite からの実データ集計（build_dashboard_data.py が生成）。";
    const host=document.getElementById("dsBody");
    if(!S.races_total){
      host.innerHTML = emptyBox("データ集計がありません。scripts/build_dashboard_data.py を実行して data.json を生成してください。");
      return;
    }
    const pr=S.period||{};
    const sc=S.sample_counts||{};
    const tiles = [
      ["収集レース数", (S.races_total||0).toLocaleString(), (pr.race_days||0)+"開催日 / "+(S.venues||0)+"競輪場"],
      ["期間", (pr.from||"—")+"〜", (pr.to||"—")+" まで"],
      ["結果あり", (S.races_with_results||0).toLocaleString(), "着順取得済レース"],
      ["払戻カバレッジ", pctR(S.payout_coverage), (S.races_with_payout||0)+" / "+(S.races_total||0)+" レース"],
      ["3連単オッズ点数", (S.odds_points_total||0).toLocaleString(), "平均 "+(S.odds_points_per_race_avg||0).toFixed(0)+"点/R"],
      ["出走/結果 行数", (sc.entries||0).toLocaleString()+" / "+(sc.results||0).toLocaleString(), "entries / results"],
    ].map(t=>`<div class="tile"><div class="tl">${t[0]}</div><div class="tv">${t[1]}</div><div class="tn">${t[2]}</div></div>`).join("");
    const fs = (S.field_size_dist||[]).map(f=>`<span class="fspill"><b>${f.size}車</b> ${(f.n||0).toLocaleString()}R</span>`).join("");
    host.innerHTML = `<div class="tiles">${tiles}</div>`
      +(fs?`<div class="fsrow">${fs}</div>`:"")
      +`<div class="note">7車立て＝ガールズ標準。5・6車立ては欠場等による変則。3連単は7車で全210通り。</div>`;
  })();

  // footer
  document.getElementById("foot").innerHTML =
    "本ダッシュボードは<b>ガールズケイリン3連単の期待値予測AI</b>の可視化です。"
    +"3段構成＝①Plackett-Luceで210通り確率／②レースタイプ分類（軸堅・標準・混戦）／③「タイプ×オッズ帯」バケットで期待値ゾーンを特定。"
    +"核心は<b>Phase4のバケット分析</b>で、ROIが100%を超えるゾーンだけを実運用対象にします。"
    +"本日のレース予測・データ収集状況・レースタイプ分布・キャリブレーションは実データ、"
    +"エッジ未確立の指標（推奨買い目・バケットROI・累積ROI）はエッジ確立まで未算出です。"
    +"予測は着順確率であって買い目ではありません。<b>狙い目マップ完成までは実弾投入しません。</b>";
}

// ---- theme toggle (light/dark, persisted) ----
(function(){
  const KEY="gk_theme";
  const saved=localStorage.getItem(KEY);
  if(saved) document.documentElement.setAttribute("data-theme",saved);
  document.addEventListener("click",e=>{
    if(e.target.closest && e.target.closest("#themeBtn")){
      const cur=document.documentElement.getAttribute("data-theme")
        || (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
      const next=cur==="dark"?"light":"dark";
      document.documentElement.setAttribute("data-theme",next);
      localStorage.setItem(KEY,next);
    }
  });
})();

// ---- トップレベルタブ（予測・分析 / 成績）の切替（静的DOM・データ非依存） ----
(function(){
  const tabs=[...document.querySelectorAll(".toptab")];
  const panes={main:document.getElementById("tab-main"), results:document.getElementById("tab-results")};
  function select(name){
    tabs.forEach(t=>{ const on=t.dataset.tab===name;
      t.setAttribute("aria-selected", on?"true":"false"); t.tabIndex=on?0:-1; });
    Object.keys(panes).forEach(k=>{ if(panes[k]) panes[k].hidden = (k!==name); });
    window.scrollTo(0,0);
  }
  tabs.forEach((t,i)=>{
    t.addEventListener("click",()=>select(t.dataset.tab));
    t.addEventListener("keydown",e=>{
      let ni=null;
      if(e.key==="ArrowRight") ni=(i+1)%tabs.length;
      else if(e.key==="ArrowLeft") ni=(i-1+tabs.length)%tabs.length;
      if(ni!=null){ e.preventDefault(); select(tabs[ni].dataset.tab); tabs[ni].focus(); }
    });
  });
})();

// PWA: サービスワーカー登録（ホーム画面インストール・オフライン対応）
let _swReg=null;
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./service-worker.js")
      .then(r=>{ _swReg=r; refreshNotifyBtn(); }).catch(()=>{});
  });

// --- 発走前 Web Push 通知（別アプリ不要のスマホOSネイティブ通知）---
function _b64ToU8(s){
  const pad="=".repeat((4-s.length%4)%4);
  const b=(s+pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(b); const u=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) u[i]=raw.charCodeAt(i);
  return u;
}
async function refreshNotifyBtn(){
  const btn=document.getElementById("notifyBtn"); if(!btn) return;
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){ btn.textContent="🔔 非対応"; btn.disabled=true; return; }
  try{
    const reg=_swReg || await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    btn.textContent = sub ? "🔔 通知ON" : "🔔 通知";
  }catch(_){}
}
async function enableNotify(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){
    alert("この端末/ブラウザはWeb Push非対応です。iPhoneはSafariで『ホーム画面に追加』したPWAから開いてください（iOS16.4+）。"); return;
  }
  let cfg={};
  try{ cfg=await fetch("./push_config.json?t="+Date.now()).then(r=>r.json()); }catch(_){}
  if(!cfg.vapidPublicKey){ alert("通知鍵(VAPID)が未設定です。PCで『python scripts/gen_vapid.py』を実行し、push_config.jsonを反映してください。"); return; }
  const perm=await Notification.requestPermission();
  if(perm!=="granted"){ alert("通知が許可されませんでした。ブラウザ設定で許可してください。"); return; }
  const reg=_swReg || await navigator.serviceWorker.ready;
  let sub=await reg.pushManager.getSubscription();
  if(!sub){
    try{ sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:_b64ToU8(cfg.vapidPublicKey)}); }
    catch(e){ alert("購読の作成に失敗しました: "+e); return; }
  }
  // 同一オリジン配信(ローカル常駐)ならサーバへ自動保存。GitHub Pages(静的)ではPOSTが通らずフォールバック。
  let saved=false;
  try{
    const res=await fetch(cfg.subscribeUrl||"./push/subscribe",
      {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(sub)});
    saved=res.ok;
  }catch(_){}
  await refreshNotifyBtn();
  if(saved){ alert("発走前通知を有効化しました。以後このPCが起動中、全ガールズレースの発走前にスマホへ通知します。"); return; }
  // フォールバック: 購読情報をコピー→PCで登録
  const s=JSON.stringify(sub);
  try{ await navigator.clipboard.writeText(s); }catch(_){}
  window.prompt(
    "通知を許可しました。あと1回だけPC側に登録が必要です（コピー済み）:\n"+
    "この文字列をPCに送り、プロジェクトで\n  python scripts/add_sub.py \"貼り付け\"\nを実行してください。",
    s);
}
document.addEventListener("DOMContentLoaded",()=>{
  const btn=document.getElementById("notifyBtn");
  if(btn){ btn.addEventListener("click", enableNotify); refreshNotifyBtn(); }
});
</script>
